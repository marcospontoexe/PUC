<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtendeBot — TeleConecta Brasil</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-left">
                <div class="bot-avatar">
                    <svg viewBox="0 0 36 36" fill="none">
                        <circle cx="18" cy="18" r="18" fill="#0066FF"/>
                        <path d="M12 16.5C12 15.672 12.672 15 13.5 15C14.328 15 15 15.672 15 16.5C15 17.328 14.328 18 13.5 18C12.672 18 12 17.328 12 16.5Z" fill="white"/>
                        <path d="M21 16.5C21 15.672 21.672 15 22.5 15C23.328 15 24 15.672 24 16.5C24 17.328 23.328 18 22.5 18C21.672 18 21 17.328 21 16.5Z" fill="white"/>
                        <path d="M14 22C14 22 15.5 24 18 24C20.5 24 22 22 22 22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <rect x="10" y="10" width="16" height="14" rx="4" stroke="white" stroke-width="1.5" fill="none"/>
                        <line x1="18" y1="7" x2="18" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="18" cy="6" r="1.5" fill="white"/>
                    </svg>
                </div>
                <div class="header-info">
                    <h1>AtendeBot</h1>
                    <span class="status-online">● Online</span>
                </div>
            </div>
            <button class="btn-reset" id="btnReset" title="Reiniciar conversa">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 4v6h6M23 20v-6h-6"/>
                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                </svg>
            </button>
        </header>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-content">
                    Olá! 👋 Bem-vindo à <strong>TeleConecta Brasil</strong>!<br>
                    Sou o <strong>AtendeBot</strong>, seu assistente virtual.<br><br>
                    Para começar, por favor me informe seu <strong>CPF</strong>.
                    <br><br>
                    <small>💡 CPFs de teste: 123.456.789-01 | 987.654.321-00 | 111.222.333-44</small>
                </div>
                <span class="message-time"></span>
            </div>
        </div>

        <div class="quick-actions" id="quickActions" style="display: none;">
            <button class="quick-btn" data-message="Qual é o meu plano?">📋 Meu Plano</button>
            <button class="quick-btn" data-message="Quero ver minha fatura">💳 Faturas</button>
            <button class="quick-btn" data-message="Preciso da segunda via do boleto">🔗 2ª Via</button>
            <button class="quick-btn" data-message="Minha internet está com problema">🔧 Problema</button>
            <button class="quick-btn" data-message="Quero trocar de plano">📦 Upgrade</button>
        </div>

        <form class="chat-input" id="chatForm">
            <input
                type="text"
                id="messageInput"
                placeholder="Digite sua mensagem..."
                autocomplete="off"
                autofocus
            >
            <button type="submit" id="btnSend">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </form>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
